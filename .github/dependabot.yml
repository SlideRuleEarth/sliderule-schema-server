# Dependabot opens weekly PRs to bump pinned dependencies.
# Each PR flows through the same branch-protection gate as any other —
# CI's `verify` job runs, reviewer approves, merge.
#
# Nothing auto-merges from this config. Security fixes (CVE-driven)
# are a separate mechanism enabled via
# `gh api -X PUT .../automated-security-fixes`; those also open PRs
# but the trigger is a published advisory, not a weekly schedule.

version: 2
updates:
  # GitHub Actions pins in .github/workflows/*.yml
  # (actions/checkout@v4, actions/setup-python@v5,
  #  hashicorp/setup-terraform@v3, github/codeql-action@v3, …)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "actions"

  # Python dependencies in the skill (requests>=2.28).
  - package-ecosystem: "pip"
    directory: "/skills/sliderule-schema"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "skills/sliderule-schema"

  # Terraform provider pins in terraform/versions.tf and the
  # committed .terraform.lock.hcl.
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "terraform"
